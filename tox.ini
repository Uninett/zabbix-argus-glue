[tox]
envlist = py{311,312,313}
skip_missing_interpreters = True

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
deps =
    pytest>=7
    pytest-asyncio
    pytest-cov
commands =
    pytest -o junit_suite_name="{envname} unit tests" \
        --cov={toxinidir}/src \
        --cov-report=xml:reports/{envname}/coverage.xml \
        --junitxml=reports/{envname}/unit-results.xml \
        --verbose {posargs}
