[tox]
requires = tox-uv>=1.13
envlist = py{311,312,313}
skip_missing_interpreters = True

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
dependency_groups = test
commands =
    pytest -o junit_suite_name="{envname} tests" \
        --cov={toxinidir}/src \
        --cov-report=xml:reports/{envname}/coverage.xml \
        --junitxml=reports/{envname}/test-results.xml \
        --verbose {posargs}
